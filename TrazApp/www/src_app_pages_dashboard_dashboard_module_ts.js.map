<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Dashboard</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card>
    <ion-card-header>
      <ion-card-subtitle>Resumen del día</ion-card-subtitle>
      <ion-card-title>{{ fechaHoy }}</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-grid>
        <ion-row>
          <ion-col class="ion-text-center">
            <h2>{{ totalBins }}</h2>
            <p>Recepciones</p>
          </ion-col>
          <ion-col class="ion-text-center">
            <h2>{{ totalCalidades }}</h2>
            <p>Evaluaciones</p>
          </ion-col>
          <ion-col class="ion-text-center">
            <h2>{{ totalSabores }}</h2>
            <p>Muestras Sabor</p>
          </ion-col>
        </ion-row>
      </ion-grid>
    </ion-card-content>
  </ion-card>

  <ion-list>
    <ion-list-header>Accesos Rápidos</ion-list-header>

    <ion-item button (click)="irA('/recepciones')">
      <ion-icon name="boat-outline" slot="start" color="primary"></ion-icon>
      <ion-label>Recepciones</ion-label>
      <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
    </ion-item>

    <ion-item button (click)="irA('/calidades')">
      <ion-icon name="flask-outline" slot="start" color="primary"></ion-icon>
      <ion-label>Calidades</ion-label>
      <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
    </ion-item>

    <ion-item button (click)="irA('/catalogos')">
      <ion-icon name="list-outline" slot="start" color="primary"></ion-icon>
      <ion-label>Catálogos</ion-label>
      <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
    </ion-item>

    <ion-item button (click)="irA('/tipos-defecto')">
      <ion-icon name="settings-outline" slot="start" color="primary"></ion-icon>
      <ion-label>Tipos de Defecto</ion-label>
      <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
    </ion-item>
  </ion-list>

</ion-content>
