<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/catalogos"></ion-back-button>
    </ion-buttons>
    <ion-title>Fincas</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="abrirForm()">
        <ion-icon name="add-circle-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="cargar($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list>
    <ion-item-sliding *ngFor="let f of fincas">
      <ion-item>
        <ion-label>
          <h2>{{ f.nombre }}</h2>
          <p>{{ nombreCliente(f.idCliente) }}</p>
        </ion-label>
        <ion-badge slot="end" [color]="f.estado === 'activo' ? 'success' : 'medium'">{{ f.estado }}</ion-badge>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="primary" (click)="abrirForm(f)">
          <ion-icon name="create-outline" slot="icon-only"></ion-icon>
        </ion-item-option>
        <ion-item-option [color]="f.estado === 'activo' ? 'warning' : 'success'" (click)="toggleEstado(f)">
          <ion-icon [name]="f.estado === 'activo' ? 'eye-off-outline' : 'eye-outline'" slot="icon-only"></ion-icon>
        </ion-item-option>
        <ion-item-option color="danger" (click)="eliminar(f)">
          <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>
</ion-content>
