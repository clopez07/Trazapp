<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/catalogos"></ion-back-button>
    </ion-buttons>
    <ion-title>Clientes</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="abrirForm()">
        <ion-icon name="add-circle-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar [(ngModel)]="busqueda" placeholder="Buscar cliente..." debounce="200"></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="cargar($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list>
    <ion-item *ngIf="clientesFiltrados.length === 0" lines="none">
      <ion-label class="ion-text-center" color="medium">Sin resultados</ion-label>
    </ion-item>
    <ion-item-sliding *ngFor="let c of clientesFiltrados">
      <ion-item>
        <ion-label>
          <h2>{{ c.nombre }}</h2>
        </ion-label>
        <ion-badge slot="end" [color]="c.estado === 'activo' ? 'success' : 'medium'">{{ c.estado }}</ion-badge>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="primary" (click)="abrirForm(c)">
          <ion-icon name="create-outline" slot="icon-only"></ion-icon>
        </ion-item-option>
        <ion-item-option [color]="c.estado === 'activo' ? 'warning' : 'success'" (click)="toggleEstado(c)">
          <ion-icon [name]="c.estado === 'activo' ? 'eye-off-outline' : 'eye-outline'" slot="icon-only"></ion-icon>
        </ion-item-option>
        <ion-item-option color="danger" (click)="eliminar(c)">
          <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>
</ion-content>
