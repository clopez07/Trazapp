<ion-header>
  <ion-toolbar color="primary">
    <ion-title>{{ laguna ? 'Editar Laguna' : 'Nueva Laguna' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cerrar()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list lines="full">
    <ion-item>
      <ion-label position="stacked">Nombre</ion-label>
      <ion-input [(ngModel)]="nombre" placeholder="Nombre de la laguna" clearInput></ion-input>
    </ion-item>

    <ion-item>
      <ion-label>Cliente</ion-label>
      <ion-select [(ngModel)]="idCliente" (ionChange)="onClienteChange()" placeholder="Seleccionar cliente" interface="action-sheet" [compareWith]="compareById">
        <ion-select-option *ngFor="let c of clientes" [value]="c.id">{{ c.nombre }}</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item>
      <ion-label>Finca</ion-label>
      <ion-select [(ngModel)]="idFinca" placeholder="Seleccionar finca" interface="action-sheet" [disabled]="!idCliente || fincas.length === 0" [compareWith]="compareById">
        <ion-select-option *ngFor="let f of fincas" [value]="f.id">{{ f.nombre }}</ion-select-option>
      </ion-select>
    </ion-item>

    <ion-item *ngIf="idCliente && fincas.length === 0" lines="none">
      <ion-label color="medium"><p>Este cliente no tiene fincas activas.</p></ion-label>
    </ion-item>
  </ion-list>

  <ion-button expand="block" class="ion-margin-top" (click)="guardar()">
    <ion-icon name="save-outline" slot="start"></ion-icon>
    Guardar
  </ion-button>
</ion-content>
