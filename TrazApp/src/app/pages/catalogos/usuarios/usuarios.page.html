<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/catalogos"></ion-back-button>
    </ion-buttons>
    <ion-title>Usuarios</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="abrirForm()">
        <ion-icon name="add-circle-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar [(ngModel)]="busqueda" placeholder="Buscar por nombre, rol, correo..." debounce="200"></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="cargar($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list>
    <ion-item *ngIf="usuariosFiltrados.length === 0" lines="none">
      <ion-label class="ion-text-center" color="medium">Sin resultados</ion-label>
    </ion-item>
    <ion-item-sliding *ngFor="let u of usuariosFiltrados" #slidingItem>
      <ion-item>
        <div class="slide-row">
          <ion-label>
            <h2>{{ u.nombre }}</h2>
            <p>{{ u.rol }} — {{ u.correo }}</p>
            <p>{{ u.telefono }}</p>
          </ion-label>
          <span [ngClass]="['badge-pill', 'badge-' + (u.estado === 'activo' ? 'success' : 'medium')]">{{ u.estado }}</span>
        </div>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="primary" (click)="abrirForm(u, slidingItem)">
          <ion-icon name="create-outline" slot="icon-only"></ion-icon>
        </ion-item-option>
        <ion-item-option [color]="u.estado === 'activo' ? 'warning' : 'success'" (click)="toggleEstado(u, slidingItem)">
          <ion-icon [name]="u.estado === 'activo' ? 'eye-off-outline' : 'eye-outline'" slot="icon-only"></ion-icon>
        </ion-item-option>
        <ion-item-option color="danger" (click)="eliminar(u, slidingItem)">
          <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>
</ion-content>
